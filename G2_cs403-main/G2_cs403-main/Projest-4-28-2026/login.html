<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Chemotherapy Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background: url('login_bg.png') no-repeat center center fixed;
            background-size: cover;
        }
        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md glass rounded-3xl shadow-2xl overflow-hidden fade-in">
        <div class="p-8">
            <!-- Logo Section -->
            <div class="flex items-center justify-center gap-3 mb-8">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                    <i data-lucide="shield-plus" class="w-8 h-8"></i>
                </div>
                <div class="text-left">
                    <h1 class="text-blue-900 font-black text-2xl leading-none">CHEMO</h1>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Pharmacy Office System</p>
                </div>
            </div>

            <!-- Login Form -->
            <div id="login-section">
                <h2 class="text-2xl font-bold text-slate-800 mb-2">ยินดีต้อนรับ</h2>
                <p class="text-sm text-slate-500 mb-8">กรุณาเข้าสู่ระบบเพื่อจัดการยาเคมีบำบัด</p>

                <form id="login-form" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">ชื่อผู้ใช้งาน (Username)</label>
                        <div class="relative">
                            <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                            <input type="text" id="login-username" required class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" placeholder="ชื่อผู้ใช้ของคุณ">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">รหัสผ่าน (Password)</label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                            <input type="password" id="login-password" required class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" placeholder="••••••••">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200 flex items-center justify-center gap-2">
                        เข้าสู่ระบบ
                        <i data-lucide="arrow-right" class="w-5 h-5"></i>
                    </button>
                </form>

                <p class="mt-8 text-center text-sm text-slate-500">
                    ยังไม่มีบัญชี? <a href="#" onclick="toggleForms()" class="text-blue-600 font-bold hover:underline">ลงทะเบียนใหม่</a>
                </p>
            </div>

            <!-- Register Form -->
            <div id="register-section" class="hidden">
                <h2 class="text-2xl font-bold text-slate-800 mb-2">สร้างบัญชีผู้ใช้</h2>
                <p class="text-sm text-slate-500 mb-8">เพิ่มเภสัชกรคนใหม่เข้าสู่ระบบ</p>

                <form id="register-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">ชื่อ-นามสกุล</label>
                        <input type="text" id="reg-fullname" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="ภก. สมชาย ใจดี">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">ชื่อผู้ใช้งาน</label>
                        <input type="text" id="reg-username" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="username123">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">รหัสผ่าน</label>
                            <input type="password" id="reg-password" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="••••••••">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">ยืนยันรหัสผ่าน</label>
                            <input type="password" id="reg-confirm" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition" placeholder="••••••••">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">ระดับสิทธิ์การใช้งาน (Role)</label>
                        <select id="reg-role" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition appearance-none">
                            <option value="General Pharmacist">General Pharmacist (เภสัชกรทั่วไป)</option>
                            <option value="Senior Pharmacist">Senior Pharmacist (เภสัชกรระดับชำนาญการ)</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-slate-800 transition shadow-lg shadow-slate-200 mt-4">
                        ลงทะเบียน
                    </button>
                </form>

                <p class="mt-8 text-center text-sm text-slate-500">
                    มีบัญชีอยู่แล้ว? <a href="#" onclick="toggleForms()" class="text-blue-600 font-bold hover:underline">เข้าสู่ระบบ</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        function toggleForms() {
            document.getElementById('login-section').classList.toggle('hidden');
            document.getElementById('register-section').classList.toggle('hidden');
        }

        // Mock User Data in LocalStorage
        if (!localStorage.getItem('chemo_users')) {
            localStorage.setItem('chemo_users', JSON.stringify([
                { fullname: 'ภก. สมชาย ใจดี', username: 'admin', password: '123', role: 'Senior Pharmacist' }
            ]));
        }

        // Login Handler
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('login-username').value;
            const pass = document.getElementById('login-password').value;
            
            const users = JSON.parse(localStorage.getItem('chemo_users'));
            const foundUser = users.find(u => u.username === user && u.password === pass);

            if (foundUser) {
                localStorage.setItem('currentUser', JSON.stringify(foundUser));
                window.location.href = 'index.html';
            } else {
                alert('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
            }
        });

        // Register Handler
        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const fullname = document.getElementById('reg-fullname').value;
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;
            const role = document.getElementById('reg-role').value;

            if (password !== confirm) {
                alert('รหัสผ่านไม่ตรงกัน');
                return;
            }

            const users = JSON.parse(localStorage.getItem('chemo_users'));
            if (users.find(u => u.username === username)) {
                alert('ชื่อผู้ใช้งานนี้มีอยู่ในระบบแล้ว');
                return;
            }

            users.push({ fullname, username, password, role });
            localStorage.setItem('chemo_users', JSON.stringify(users));
            
            alert('ลงทะเบียนสำเร็จ! กรุณาเข้าสู่ระบบ');
            toggleForms();
        });
    </script>
</body>
</html>
